<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Transparent background -->
  
  <!-- Three-band swirl emblem -->
  <g transform="translate(40, 40)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="white" stroke-width="4"/>
    
    <!-- Three curved bands -->
    <path d="M0,-35 A35,35 0 0,1 30.3,17.5" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M30.3,17.5 A35,35 0 0,1 -30.3,17.5" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-30.3,17.5 A35,35 0 0,1 0,-35" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Inner swirl details -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="0" cy="0" r="4" fill="white"/>
  </g>
</svg>
